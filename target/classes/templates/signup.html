<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account - ResumePRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; background: var(--bg-dark); position: relative; overflow: hidden;">
    <div class="dot-grid-bg"></div>
    <div class="glow-mesh" style="top: -15%; right: -10%; left: auto; width: 50%; height: 50%;"></div>

    <div class="glass-card animate-fade-up" style="width: 100%; max-width: 440px; padding: 3.5rem; position: relative; z-index: 10;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <a href="/" class="logo" style="font-size: 2rem;">RESUME<span>PRO</span></a>
            <h2 style="margin-top: 1.5rem; font-size: 1.75rem; font-weight: 800;">Join ResumePRO</h2>
            <p style="color: var(--text-secondary); margin-top: 0.4rem; font-size: 0.95rem;">Start building your future today</p>
        </div>

        <form th:action="@{/signup}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
            Already have an account? <a th:href="@{/login}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
        </p>
    </div>
</body>
</html>
