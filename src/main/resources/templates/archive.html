<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Archive History - ResumePRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-animate">
    <div class="dot-grid-bg"></div>
    <div class="glow-mesh" style="top: -20%; right: -10%; left: auto; width: 40%; height: 40%;"></div>

    <nav class="navbar glass">
        <div class="nav-content">
            <a href="/" class="logo">RESUME<span>PRO</span></a>
            <div style="display: flex; align-items: center; gap: 2rem;">
                <a href="/dashboard/settings" style="color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Settings
                </a>
                <a href="/dashboard" style="color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Back to Workspace
                </a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-secondary" style="padding: 0.5rem 1.25rem; font-size: 0.85rem;">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-bottom: 5rem; margin-top: 10rem;">
        <div class="animate-fade-up">
            <h1 style="font-size: 2.5rem; font-family: 'Outfit'; margin-bottom: 1rem;">Archive History</h1>
            <p style="color: var(--text-secondary); margin-bottom: 3rem;">Review and manage your archived profiles. You can restore them to your workspace or delete them permanently.</p>
        </div>

        <div th:if="${success}" class="animate-fade-up" style="margin-bottom: 2rem;">
            <div class="badge badge-success" style="padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 12px; font-size: 0.9rem;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                <span th:text="${success}">Success</span>
            </div>
        </div>

        <div class="dashboard-grid animate-fade-up">
            <div th:each="resume : ${archivedResumes}" class="glass-card animate-fade-up" style="padding: 2.25rem; display: flex; flex-direction: column; justify-content: space-between; min-height: 300px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.03);">
                <div style="position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #f59e0b; opacity: 0.1;"></div>
                
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem;">
                        <div style="font-family: 'Outfit'; font-weight: 800; font-size: 1.4rem; color: #fff; line-height: 1.2;" th:text="${resume.title}">Resume</div>
                        <div style="font-size: 0.65rem; color: var(--text-secondary); font-weight: 800; padding: 0.35rem 0.65rem; background: rgba(255,255,255,0.03); border-radius: 6px; letter-spacing: 0.05em;" th:text="'ID: ' + ${resume.id}">ID</div>
                    </div>
                    <div style="color: var(--text-secondary); font-size: 0.8rem; font-weight: 500;" th:text="'Archived ' + ${#temporals.format(resume.updatedAt, 'MMM dd, HH:mm')}">Date</div>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-top: 2rem;">
                    <form th:action="@{/dashboard/unarchive/{id}(id=${resume.id})}" method="post" style="width: 100%;">
                        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                            Restore to Workspace
                        </button>
                    </form>
                    <form th:action="@{/dashboard/delete/{id}(id=${resume.id})}" method="post" style="width: 100%;" onsubmit="return confirm('Permanently delete this profile? This action cannot be undone.');">
                        <button type="submit" class="btn btn-secondary" style="width: 100%; padding: 0.75rem; font-size: 0.85rem; opacity: 0.6; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                            Delete Permanently
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(archivedResumes)}" style="text-align: center; padding: 6rem; color: var(--text-secondary);">
            <div style="margin-bottom: 1.5rem; opacity: 0.2;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
            </div>
            <p style="font-size: 1.1rem; font-family: 'Outfit'; font-weight: 500;">Archive is empty</p>
            <p style="font-size: 0.85rem; margin-top: 0.5rem; opacity: 0.6;">Your archived profiles will appear here.</p>
        </div>
    </main>
</body>
</html>
